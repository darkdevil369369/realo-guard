name: Generate signing keystore

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore (only if missing)
        run: |
          if [ -f app/realo.keystore ]; then
            echo "Keystore already exists — skipping."
            exit 0
          fi
          keytool -genkeypair -v \
            -keystore app/realo.keystore \
            -alias realo -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass realo123 -keypass realo123 \
            -dname "CN=REALO Guard, O=REALO, L=Global, C=US"
          echo "Keystore created."

      - name: Commit keystore
        run: |
          if git diff --quiet --exit-code -- app/realo.keystore 2>/dev/null && git ls-files --error-unmatch app/realo.keystore >/dev/null 2>&1; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/realo.keystore
          git commit -m "Add fixed signing keystore (consistent updates)" || echo "nothing to commit"
          git push
